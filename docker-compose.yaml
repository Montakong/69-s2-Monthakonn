services:
  db:
    image: postgres:16-alpine
    container_name: 69-s2-db
    ports:
      
54321:5432
  environment:
POSTGRES_PASSWORD=123456
POSTGRES_USER=mos
POSTGRES_DB=mos

  admin:
    image: dpage/pgadmin4
    container_name: 69-s2-admin
    ports:
      
8082:80
  environment:
PGADMIN_DEFAULT_EMAIL=mos@admin.com
PGADMIN_DEFAULT_PASSWORD=123456
depends_on:
db
